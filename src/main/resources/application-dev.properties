# ──────────────────────────────────────────────
#  application-dev.properties — SquadUp DESARROLLO LOCAL
#  BD: H2 en memoria. No requiere PostgreSQL instalado.
#  Activa con: -Dspring-boot.run.profiles=dev
# ──────────────────────────────────────────────

# ── MySQL local ───────────────────────────────
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/squadup_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=243468

# H2 console desactivada (usamos MySQL)
spring.h2.console.enabled=false

# ── JPA ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# SQL Init desactivado (MySQL ya tiene el schema)
spring.sql.init.mode=never

# ── JWT (clave dev >= 32 chars) ────────────────
app.jwt.secret=SquadUpDevSecretKey2024XyzAbc12345678
app.jwt.expiration-ms=86400000


# ── Upload / WebSocket / Servidor ──────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads
app.websocket.heartbeat=30000
server.port=8080
server.error.include-message=always
