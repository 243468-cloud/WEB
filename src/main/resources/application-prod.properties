# ──────────────────────────────────────────────
#  application-prod.properties — SquadUp PRODUCCIÓN (Railway)
#  Todas las credenciales se leen desde variables de entorno.
#  Activa con: SPRING_PROFILES_ACTIVE=prod
# ──────────────────────────────────────────────

# ── Base de datos MySQL (Railway) ─────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}


# ── Upload de archivos ────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── WebSocket ─────────────────────────────────
app.websocket.heartbeat=30000

# ── Servidor ──────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=always

# ── Logging (menos verboso en producción) ─────
logging.level.com.squadup=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
