# ──────────────────────────────────────────────
#  application.properties — SquadUp Backend
#  Configuración LOCAL por defecto (desarrollo).
#  En producción (Railway) se usa el perfil: prod
#  Activa con: SPRING_PROFILES_ACTIVE=prod
# ──────────────────────────────────────────────

spring.application.name=squadup-backend

# ── Base de datos MySQL (local) ────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/SquatUp1?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:243468}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.com.squadup=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:squadup-local-dev-secret-key-32chars!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}


# ── Upload de archivos (avatares, imágenes lobby) ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── CORS ────────────────────────────────────
# En producción, sobreescribir con la URL real del frontend (ej. https://squadup.app)
# Separar múltiples orígenes por coma: http://localhost:4200,https://squadup.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── WebSocket ───────────────────────────────
app.websocket.heartbeat=30000

# ── Servidor ────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=always
